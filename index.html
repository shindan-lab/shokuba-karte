const C={A:'#DB2777',B:'#7C3AED',C:'#2563EB',D:'#D97706',E:'#0F766E',F:'#DC2626',G:'#1D4ED8',H:'#6B7280'};
const Q=[['月曜の朝、仕事のことを考えたときに近いのは？',[['今週も周りに気を張りそうだなと思う',{A:3}],['結局また自分が多く持つ気がする',{B:3}],['ちゃんとやらなきゃと気が固くなる',{D:3}],['そこまで重くは感じない',{}]]],['上司や先輩に話しかけられたとき、無意識に起きやすいのは？',[['声色や空気から機嫌を探る',{A:2,C:1}],['評価につながる話ではないか少し身構える',{C:3}],['何か頼まれる前提で反応してしまう',{E:2,B:1}],['内容だけを聞けている方だと思う',{}]]],['頼まれごとが重なったとき、自分に近い反応は？',[['きつくても、とりあえず受ける方に傾く',{E:3}],['自分で持った方が早いと思ってしまう',{B:3}],['断った後の印象が少し気になる',{C:2,E:1}],['状況を見て受けるか決められる',{}]]],['仕事でミスや抜け漏れがあったときに近いのは？',[['かなり引きずって、ずっと気になる',{D:2,C:1}],['周囲からどう見られたかが一番気になる',{C:3}],['次からはもっと確認しようと自分を締める',{D:3}],['反省はするが、必要以上には引きずらない',{}]]],['会議や打ち合わせのあと、どっと疲れやすいのはどんなとき？',[['場の空気や全員の反応を拾いすぎたとき',{A:3}],['言いたいことを飲み込んだとき',{F:3}],['先の展開や失敗を考えすぎたとき',{G:3}],['そこまで強く消耗しない',{}]]],['「助けてほしい」と思ったとき、自分に近いのは？',[['頼る前に、自分で片づけようとしてしまう',{B:2,H:1}],['言いたいけど、言葉にしづらくて飲み込む',{F:3}],['頼った後の反応や評価が少し気になる',{C:2,E:1}],['必要なら比較的相談できる',{}]]],['まだ起きていない仕事のことで疲れやすいのは？',[['会議や提出の先を何パターンも考えてしまうとき',{G:3}],['正解や基準が見えないまま進むとき',{D:2,G:1}],['役割や範囲が曖昧なまま任されるとき',{E:2,G:1}],['そこまでは考え込みにくい',{}]]],['職場の人間関係で一番削られやすいのは？',[['誰か一人より、全体の雰囲気や温度感',{A:3}],['評価してくる人や見てくる人の存在',{C:3}],['本音を飲み込む場面が続くこと',{F:2,A:1}],['そこが主な原因ではない',{}]]],['休みの日の自分に近いのは？',[['仕事のことが頭から離れにくい',{G:2,H:1}],['休んでも、何がしんどいのかはっきりしない',{H:3}],['「まだちゃんとできていない」感じが残る',{D:2,B:1}],['比較的切り替えられる方だ',{}]]],['最近の自分に近いのは？',[['嫌というより、じわじわ削られている感じがある',{A:2,H:1}],['何が原因か曖昧なまま、元気が出にくい',{H:3}],['ちゃんとやっているのに、いつも余裕がない',{B:2,D:1}],['波はあるが、基本は保てている',{}]]],['今の職場でしんどさが強まりやすい場面は？',[['人の感情や空気に左右される場面',{A:3}],['自分だけが抱えている仕事が増える場面',{B:2,E:1}],['「これで十分」の線引きがしにくい場面',{D:3}],['特定の場面というより全体的に重い',{H:3}]]],['もし明日、職場で一つだけ負担を減らせるなら？',[['周囲の空気まで読まなくていいこと',{A:2,F:1}],['自分ばかり持っている仕事',{B:3}],['先のことを考えすぎる時間',{G:3}],['自分でも説明しにくい、ずっと重い感じ',{H:3}]]]];
const T={A:['空気を背負いやすいタイプ','あなたのしんどさの正体は、『仕事そのもの』より場の空気まで引き受けていることです','会議で誰が何を思っているかをなんとなく拾ってしまう。上司の声色がいつもより少し固いだけで気になる。誰かが不機嫌そうだと、自分に原因があるのではと考えてしまう。あなたは、業務だけでなく職場の温度まで処理しながら働いている人です。\n\n空気を読めること自体は大きな力です。気配りができるし、衝突を減らせるし、場をなめらかに回す役にもなれます。でもそれは、常に神経を使う働き方でもあります。本来は自分が背負わなくていい感情まで受け取り続ければ、しんどくなるのは当然です。','あなたが敏感だからこそ、うまく回っていた場面はきっとたくさんあります。でも、場を守る役をずっと引き受けてきた人ほど、静かにすり減っていくんです。疲れるのは、あなたが弱いからではありません。','まずは一日一回だけ、「これは自分の感情ではない」と心の中で切り分けてみてください。誰かの機嫌まで管理しなくていい、と自分に許可を出すことが回復の第一歩です。'],B:['抱え込みやすいタイプ','あなたのしんどさの正体は、『責任感の強さ』がそのまま負荷になっていることです','頼まれたら断りにくい。任せるより自分でやった方が早い。気づけば仕事が自分のところに集まってきている。そんな流れが、もう当たり前になっていませんか。あなたは、仕事を回す側に自然となりやすい人です。\n\nそれは能力がある証拠でもあります。でも、できる人のところには仕事が寄ってきます。そして一度それが当たり前になると、周囲も悪気なく頼るようになります。今のしんどさは、単に忙しいからではなく、あなたが「持ててしまう人」だからこそ起きている構造かもしれません。','ちゃんとやれてしまう人ほど、限界が見えにくいんですよね。周りから見れば頼れる人でも、その中ではずっと息切れしていたはずです。ここまでよく持ちこたえてきました。','今日から、頼まれごとに即答しないことを試してみてください。「確認してから返します」を一回挟むだけで、抱え込む流れを少し止められます。'],C:['評価に削られやすいタイプ','あなたのしんどさの正体は、『仕事』より見られ方に神経を使いすぎていることです','上司がどう思ったか、同僚にどう見えたか、返信がそっけなかった意味は何か。仕事の内容そのものより、その先にある評価や印象がずっと気になってしまう。そんな働き方になっていませんか。あなたは、成果だけでなく「見え方」まで背負って働いている人です。\n\n評価を気にすることは悪いことではありません。むしろ真面目だからこそです。ただ、評価への意識が強すぎると、仕事の一つひとつが試験のようになってしまいます。本来は流していい小さな出来事まで重く受け止め、心が休まらなくなるんです。','よく見られたいというより、雑に見られたくなかっただけなんですよね。ちゃんとやっていることを、ちゃんと受け取ってほしかった。その気持ちは、すごく自然です。','今日あった出来事を一つだけ振り返って、「事実」と「自分の解釈」を分けてメモしてみてください。評価へのしんどさは、解釈がふくらみすぎたときに強くなります。'],D:['ちゃんとしなきゃで疲れるタイプ','あなたのしんどさの正体は、『丁寧さ』が休みなく働いていることです','抜け漏れが怖い。確認不足と思われたくない。少しでも不安があると、もう一度見直す。あなたは、仕事を雑に扱えない人です。その真面目さが、周囲からの信頼につながってきたことも多いはずです。\n\nただ、その丁寧さがいつもフル稼働だと、心はかなり疲れます。八割で十分な仕事にも百点を出そうとしてしまう。ミスを防ぐために気を張り続ける。今のしんどさは、能力不足ではなく、むしろ「ちゃんとしようとし続けてきた反動」に近いものです。','雑にやれないのは、あなたの誠実さです。その姿勢に助けられてきた人は確実にいます。でも、毎回それを全力でやるのは本当に消耗します。もう少し力を抜いても、大丈夫です。','今日の仕事の中で一つだけ、「ここは八割で出す」と決めてみてください。全部を百点で出し続けないことが、長く働くための現実的な工夫になります。'],E:['境界線が薄くなりやすいタイプ','あなたのしんどさの正体は、『自分の仕事の外側』まで引き受けていることです','本来は自分の担当ではないことまで、なんとなく手を出してしまう。断ればいいとわかっていても、その場の流れや相手への気遣いで引き受けてしまう。あなたは、仕事の境界線をやわらかく保とうとする人です。\n\nその姿勢は、チームワークの面では強みです。でも境界線が薄いままだと、負担の整理がつかなくなります。自分の役割が増えているのに、はっきり増えた感覚が持てないまま疲弊していくんです。しんどいのに説明しづらいのは、そのせいかもしれません。','協力しようとしてきたんですよね。冷たくしたかったわけでも、断りたかったわけでもない。ただ、ずっと譲りすぎてきただけなんです。その優しさの代償が、今の疲れとして出ています。','まずは一つ、「それは今の自分の担当か？」と心の中で確認する癖をつけてみてください。引き受ける前に一拍置くだけで、境界線は少しずつ戻せます。'],F:['言えない不満が溜まりやすいタイプ','あなたのしんどさの正体は、『飲み込んできた言葉』が静かに積もっていることです','本当は嫌だった。納得していなかった。でも言うほどではないと思ってきた。角が立つよりは自分が我慢した方が早い。そんな選択を積み重ねてきたのではないでしょうか。あなたは、場を壊さないために本音を奥へしまう人です。\n\n言わなかったことは、その場では正解に見えることがあります。でも、言えなかった気持ちは消えません。静かに残り続けて、別の疲れとして体に出てきます。今のしんどさは、怠けでも甘えでもなく、ずっと抑えてきた反応が遅れて出てきている状態かもしれません。','よく飲み込んできましたね。言わない方が丸く収まるとわかっている人ほど、自分の中だけが荒れていくんです。あなたはちゃんと、しんどくていいです。','いきなり職場で全部言わなくて大丈夫です。まずはノートやスマホのメモに、本当は嫌だったことを一つだけ言葉にしてみてください。外に出すだけでも、かなり違います。'],G:['先回りで消耗しやすいタイプ','あなたのしんどさの正体は、『まだ起きていないこと』まで先に働いていることです','これを言ったらどう思われるか。次の会議で詰められないか。失敗したらどうなるか。まだ現実には起きていないことを、先に何パターンも考えてしまう。あなたは、先を読む力が強い人です。\n\nその力は、本来とても有能です。危険を避けたり、準備を整えたりするのに役立つからです。でも、先回りが強すぎると、実際の業務よりも「想像の中の仕事」で疲れてしまいます。心が休まらないのは、常に少し先の未来で働いているからなんです。','ちゃんと備えようとしてきたんですよね。考えすぎと言われても、考えないと不安だった。その慎重さに助けられてきた場面も、きっとたくさんありました。','不安が出たら、「今すぐできる準備」と「まだ考えなくていいこと」に分けてみてください。先の全部を今日処理しようとしないだけで、かなり楽になります。'],H:['限界が見えにくいタイプ','あなたのしんどさの正体は、『疲れていることを後回しにし続けてきたこと』です','まだ大丈夫。みんなこんなもの。今だけだから。そう思って走ってきた結果、自分の疲れを感じ取るセンサー自体が鈍っているのかもしれません。明確な不満はないのに元気が出ない、休んでもすっきりしない、何が原因かもよくわからない。そんな状態が続いていませんか。\n\n人は限界を超えると、むしろ鈍くなります。危険信号を感じにくくなるんです。だから「まだ働けている」ことと「余裕がある」ことは同じではありません。今のあなたに必要なのは、もっと頑張ることではなく、まず自分の状態を正確に認識することです。','気づけないくらい、ずっと頑張ってきたんですよね。立ち止まる理由を探さなくていいです。しんどいかもしれない、と思えた時点で、もう十分大事なサインです。','今日は帰宅後に、仕事のことを考える前に「今の疲れを10点満点で何点か」だけつけてみてください。曖昧な疲れを数字にするだけでも、限界の見え方が変わります。']};function calc(){const s={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};answers.forEach(a=>Object.entries(a).forEach(([k,v])=>s[k]+=v));const x=Object.entries(s).sort((a,b)=>b[1]-a[1]);return{main:x[0][0],sub:x[1][0]}}function share(main){const url='https://shindan-lab.github.io/shokuba-karte/';return `職場でしんどい理由、これだったかも。私は「${T[main][0]}」でした。\n\n▼職場しんどいカルテ\n${url}\n\n#職場しんどいカルテ #診断Lab`}let i=0,answers=[];function sc(id){['top','quiz','loading','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide');window.scrollTo({top:0,behavior:'instant'})}function render(){document.getElementById('ptext').textContent=`${i+1} / ${Q.length}`;document.getElementById('pbar').style.width=((i+1)/Q.length*100)+'%';document.getElementById('backbtn').disabled=i===0;document.getElementById('q').textContent=Q[i][0];const o=document.getElementById('opts');o.innerHTML='';Q[i][1].forEach(it=>{const b=document.createElement('button');b.className='opt';b.textContent=it[0];b.onclick=()=>{answers[i]=it[1];if(i<Q.length-1){i++;render()}else{sc('loading');setTimeout(show,1200)}};o.appendChild(b)})}function start(){i=0;answers=[];sc('quiz');render()}function back(){if(i>0){i--;render()}}function show(){const r=calc(),m=T[r.main],s=T[r.sub];document.getElementById('head').style.background=C[r.main];document.getElementById('head').innerHTML=`<div style='font-size:11px;letter-spacing:.18em;opacity:.9'>あなたの職場しんどさタイプ</div><div class='h2'>${m[0]}</div>`;document.getElementById('headline').textContent=m[1];document.getElementById('body').innerHTML=m[2].split('\n\n').map(x=>`<p>${x}</p>`).join('');document.getElementById('letter').textContent=m[3];document.getElementById('pres').textContent=m[4];const st=document.getElementById('subtype');st.textContent=`今のあなたには「${s[0]}」の傾向も少しあります。`;st.classList.remove('hide');if(typeof affiliateData!=='undefined'&&affiliateData[r.main]&&affiliateData[r.main].url){document.getElementById('aff').classList.remove('hide');document.getElementById('afft').textContent=affiliateData[r.main].title;document.getElementById('affd').textContent=affiliateData[r.main].desc;document.getElementById('afflink').href=affiliateData[r.main].url}else{document.getElementById('aff').classList.add('hide')}const sh=encodeURIComponent(share(r.main));document.getElementById('sx').href='https://twitter.com/intent/tweet?text='+sh;document.getElementById('st').href='https://www.threads.net/intent/post?text='+sh;sc('result')}function resetQuiz(){sc('top')}</script>
